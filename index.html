<!doctype html>
<html lang="fr">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Penal Code — The State of San Andreas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">

<style>
:root{
  --marine:#0A1B33;
  --or:#B59455;
  --or-clair:#D8BE8A;
  --papier:#E6DED4;
  --encre:#1E2A38;
  --encre-doux:#33414F;

  /* marges calées sur les filets dorés de pages.webp */
  --m-haut:9%;
  --m-bas:8.4%;
  --m-gouttiere:8%;
  --m-tranche:19%;

  --duree-page:.72s;
  --courbe:cubic-bezier(.42,.04,.22,1);
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;overflow:hidden;color:var(--papier);
  font-family:"Source Serif 4",Georgia,serif;
  background:radial-gradient(ellipse at 50% 40%,#132741 0%,#050B14 72%)}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}

/* ===== Scène ===== */
#scene{position:fixed;inset:0;overflow:hidden}
#stage{position:absolute;left:50%;top:50%;width:1484px;height:1060px;transform-origin:center center;
  transform:translate(-50%,-50%) scale(var(--s,1));
  transition:transform .45s cubic-bezier(.2,.7,.2,1)}
#book{position:absolute;inset:0;
  background:url("assets/pages.webp") center/100% 100% no-repeat;
  perspective:2800px;
  filter:drop-shadow(0 40px 70px rgba(0,0,0,.7));
  opacity:0;transform:scale(.965) translateY(14px);
  transition:opacity .75s ease,transform .75s cubic-bezier(.2,.7,.2,1)}
#book.ouvert{opacity:1;transform:none}

/* ===== Pages ===== */
.page{position:absolute;top:0;width:50%;height:100%;display:flex;flex-direction:column;
  color:var(--encre);overflow:hidden}
.page.left {left:0;   padding:var(--m-haut) var(--m-gouttiere) var(--m-bas) var(--m-tranche)}
.page.right{left:50%; padding:var(--m-haut) var(--m-tranche) var(--m-bas) var(--m-gouttiere)}
.page-inner{flex:1;min-height:0;overflow:hidden}

/* sommaire : la seule page qui défile */
.page-inner.scroll{overflow-y:auto;padding-right:12px;
  scrollbar-width:thin;scrollbar-color:rgba(181,148,85,.55) transparent;
  -webkit-mask-image:linear-gradient(to bottom,#000 0,#000 94%,transparent 100%);
          mask-image:linear-gradient(to bottom,#000 0,#000 94%,transparent 100%)}
.page-inner.scroll::-webkit-scrollbar{width:6px}
.page-inner.scroll::-webkit-scrollbar-track{background:rgba(10,27,51,.06);border-radius:3px}
.page-inner.scroll::-webkit-scrollbar-thumb{background:rgba(181,148,85,.6);border-radius:3px}
.page-inner.scroll::-webkit-scrollbar-thumb:hover{background:var(--or)}

/* ===== En-tête / pied ===== */
.p-head{display:flex;align-items:center;justify-content:center;gap:14px;
  padding-bottom:12px;border-bottom:1.5px solid rgba(10,27,51,.42);margin-bottom:26px}
.p-head h4{margin:0;font-family:"Cormorant Garamond",serif;font-weight:700;font-size:21px;
  letter-spacing:.14em;color:var(--marine);text-transform:uppercase}
.p-head h5{margin:2px 0 0;font-family:"Source Serif 4",serif;font-weight:600;font-size:11.5px;
  letter-spacing:.20em;color:#8A6F3C;text-transform:uppercase}
.p-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-top:10px;
  border-top:1.5px solid rgba(10,27,51,.42);margin-top:18px;
  font-family:"Source Serif 4",serif;font-size:10.5px;font-weight:600;letter-spacing:.14em;
  color:#6E6455;text-transform:uppercase}
.p-foot .fleuron{color:var(--or);letter-spacing:.3em;font-size:12px}

/* ===== Blocs ===== */
.b-livre{text-align:center;margin:4px 0 28px}
.b-livre .tag{display:inline-block;background:var(--marine);color:var(--or-clair);
  font-family:"Source Serif 4",serif;font-weight:700;font-size:14px;letter-spacing:.26em;
  padding:7px 24px 6px;text-transform:uppercase}
.b-livre h2{margin:18px 0 0;font-family:"Cormorant Garamond",serif;font-weight:700;font-size:36px;
  line-height:1.1;color:var(--marine);text-transform:uppercase}
.b-livre .rule{margin-top:14px;color:var(--or);letter-spacing:.35em;font-size:13px}

.b-titre{text-align:center;margin:0 0 26px}
.b-titre .k{font-family:"Source Serif 4",serif;font-weight:700;font-size:14px;letter-spacing:.22em;
  color:var(--marine);text-transform:uppercase}
.b-titre .n{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:22px;letter-spacing:.04em;
  color:var(--encre);text-transform:uppercase;margin-top:4px}

.b-art{display:grid;grid-template-columns:56px 1fr;gap:18px;padding-bottom:18px;margin-bottom:18px;
  border-bottom:1px solid rgba(10,27,51,.22)}
.b-art:last-child{border-bottom:0}
.b-art .num{background:var(--marine);color:#fff;text-align:center;padding:8px 0 10px;height:max-content}
.b-art .num small{display:block;font-family:"Source Serif 4",serif;font-size:8px;font-weight:600;
  letter-spacing:.16em;color:var(--or-clair);text-transform:uppercase}
.b-art .num b{display:block;font-family:"Source Serif 4",serif;font-size:20px;font-weight:700;line-height:1.15}
.b-art h3{margin:0 0 7px;font-family:"Source Serif 4",serif;font-weight:700;font-size:15px;
  letter-spacing:.05em;color:var(--marine);text-transform:uppercase}
.b-art p{margin:0 0 8px;font-size:15px;line-height:1.68;text-align:justify;hyphens:auto;color:var(--encre-doux)}
.b-art .peine{display:inline-block;margin-top:3px;font-family:"Source Serif 4",serif;font-size:12px;
  font-weight:600;letter-spacing:.06em;color:#8A6F3C;border-top:1px solid rgba(181,148,85,.6);padding-top:6px}
.b-art.cible{animation:cible 1.8s ease}
@keyframes cible{
  0%{background:rgba(181,148,85,.30);box-shadow:0 0 0 8px rgba(181,148,85,.14)}
  55%{background:rgba(181,148,85,.22);box-shadow:0 0 0 8px rgba(181,148,85,0)}
  100%{background:transparent;box-shadow:none}
}

/* ===== Page de garde ===== */
.garde{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%}
.garde .flourish{color:var(--or);letter-spacing:.4em;font-size:15px;margin:18px 0 24px}
.garde h1{margin:0;font-family:"Cormorant Garamond",serif;font-weight:700;font-size:48px;line-height:1.05;
  color:var(--marine);text-transform:uppercase}
.garde .sub{font-family:"Source Serif 4",serif;font-weight:600;font-size:14px;letter-spacing:.3em;
  color:#8A6F3C;margin-top:14px;text-transform:uppercase}
.garde .sep{width:72%;height:1px;background:linear-gradient(90deg,transparent,var(--or),transparent);margin:26px 0}
.garde h2{margin:0;font-family:"Cormorant Garamond",serif;font-weight:700;font-size:60px;
  color:var(--encre);text-transform:uppercase}
.garde .edition{font-family:"Source Serif 4",serif;font-weight:700;font-size:14px;letter-spacing:.22em;
  color:var(--marine);margin-top:30px;text-transform:uppercase}
.garde .devise{font-family:"Source Serif 4",serif;font-size:13px;letter-spacing:.26em;color:#8A6F3C;
  margin-top:12px;text-transform:uppercase}

/* ===== Sommaire imprimé ===== */
.b-somm h2{margin:0 0 4px;text-align:center;font-family:"Cormorant Garamond",serif;font-weight:700;
  font-size:32px;letter-spacing:.12em;color:var(--marine);text-transform:uppercase}
.b-somm .rule{text-align:center;color:var(--or);letter-spacing:.35em;font-size:13px;margin-bottom:22px}
.b-somm .sl{margin:18px 0 6px;font-family:"Source Serif 4",serif;font-weight:700;font-size:12.5px;
  letter-spacing:.18em;color:var(--marine);text-transform:uppercase}
.b-somm .st{margin:10px 0 4px;font-family:"Cormorant Garamond",serif;font-size:16px;letter-spacing:.04em;
  color:#6E6455}
.b-somm .sa{display:flex;align-items:baseline;gap:8px;font-size:14px;color:var(--encre-doux);
  padding:4px 6px 4px 12px;cursor:pointer;border-radius:2px;
  transition:background .18s ease,color .18s ease,padding-left .18s ease}
.b-somm .sa:hover{color:var(--marine);background:rgba(181,148,85,.14);padding-left:16px}
.b-somm .sa b{font-family:"Source Serif 4",serif;font-weight:700;color:var(--marine);min-width:34px}
.b-somm .sa .pt{flex:1;border-bottom:1px dotted rgba(10,27,51,.38);transform:translateY(-4px)}
.b-somm .sa i{font-style:normal;font-family:"Source Serif 4",serif;font-weight:600;color:#8A6F3C}

/* ===== Feuille qui tourne ===== */
#leaf{position:absolute;top:0;left:50%;width:50%;height:100%;z-index:8;
  transform-origin:left center;transform-style:preserve-3d;display:none}
#leaf .face{position:absolute;inset:0;backface-visibility:hidden;overflow:hidden;
  background:url("assets/pages.webp") no-repeat;background-size:200% 100%;
  display:flex;flex-direction:column;color:var(--encre)}
#leaf .face.front{background-position:right center;
  padding:var(--m-haut) var(--m-tranche) var(--m-bas) var(--m-gouttiere)}
#leaf .face.back{background-position:left center;transform:rotateY(180deg);
  padding:var(--m-haut) var(--m-gouttiere) var(--m-bas) var(--m-tranche)}
/* voile de courbure : s'assombrit au milieu de la rotation */
#leaf .face::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:0}
#leaf .face.front::after{background:linear-gradient(90deg,rgba(20,12,4,.5) 0%,rgba(20,12,4,.12) 32%,rgba(255,255,255,.10) 78%,rgba(255,255,255,0) 100%)}
#leaf .face.back::after{background:linear-gradient(270deg,rgba(20,12,4,.5) 0%,rgba(20,12,4,.12) 32%,rgba(255,255,255,.10) 78%,rgba(255,255,255,0) 100%)}
#leaf.anim{transition:transform var(--duree-page) var(--courbe)}
#leaf.anim .face::after{animation:voile var(--duree-page) var(--courbe)}
@keyframes voile{0%{opacity:0}45%{opacity:1}100%{opacity:0}}
/* ombre portée sur la page qui reste dessous */
#ombreGouttiere{position:absolute;top:0;bottom:0;width:22%;z-index:7;pointer-events:none;opacity:0}
#ombreGouttiere.avant{left:50%;background:linear-gradient(90deg,rgba(20,12,4,.42),transparent)}
#ombreGouttiere.arriere{right:50%;background:linear-gradient(270deg,rgba(20,12,4,.42),transparent)}
#ombreGouttiere.joue{animation:voile var(--duree-page) var(--courbe)}

/* ===== Entrée du contenu ===== */
.page.entree .b-livre,
.page.entree .b-titre,
.page.entree .b-art,
.page.entree .b-somm,
.page.entree .garde{animation:monter .5s var(--courbe) both}
.page.entree .b-art:nth-child(2){animation-delay:.05s}
.page.entree .b-art:nth-child(3){animation-delay:.10s}
.page.entree .b-art:nth-child(4){animation-delay:.15s}
.page.entree .b-art:nth-child(5){animation-delay:.20s}
.page.entree .b-art:nth-child(6){animation-delay:.25s}
.page.entree .b-art:nth-child(n+7){animation-delay:.30s}
@keyframes monter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ===== Chrome ===== */
#bar{position:fixed;top:0;left:0;right:0;height:56px;display:flex;align-items:center;gap:10px;
  padding:0 18px;z-index:40;background:linear-gradient(180deg,rgba(5,11,20,.92),rgba(5,11,20,0))}
.btn{position:relative;overflow:hidden;padding:8px 16px;border:1px solid rgba(181,148,85,.5);
  color:var(--or-clair);border-radius:2px;font-family:"Source Serif 4",serif;font-weight:600;
  font-size:12px;letter-spacing:.16em;text-transform:uppercase;
  transition:background .25s ease,border-color .25s ease,color .25s ease}
.btn::before{content:"";position:absolute;inset:0;transform:translateX(-110%);
  background:linear-gradient(105deg,transparent,rgba(216,190,138,.28),transparent);transition:transform .6s ease}
.btn:hover{background:rgba(181,148,85,.16);border-color:var(--or);color:#F0E2C4}
.btn:hover::before{transform:translateX(110%)}
.btn:focus-visible{outline:2px solid var(--or-clair);outline-offset:2px}
#folio{margin-left:auto;font-family:"Source Serif 4",serif;font-weight:600;letter-spacing:.16em;
  color:#7E8DA0;font-size:12px;text-transform:uppercase}
.btn .kbd{margin-left:9px;padding:1px 6px;font-size:10px;letter-spacing:.06em;
  border:1px solid rgba(181,148,85,.4);border-radius:2px;color:#B9C6D6;opacity:.8}

.nav{position:fixed;top:50%;z-index:35;width:54px;height:54px;border-radius:50%;
  border:1px solid rgba(181,148,85,.45);color:var(--or-clair);font-size:22px;display:grid;place-items:center;
  transform:translateY(-50%);transition:background .25s ease,box-shadow .25s ease,opacity .3s ease}
.nav:hover{background:rgba(181,148,85,.2);box-shadow:0 0 22px rgba(181,148,85,.28)}
.nav:active{background:rgba(181,148,85,.34)}
.nav[disabled]{opacity:.18;pointer-events:none}
#prev{left:18px} #next{right:18px}

#drawer{position:fixed;inset:0 auto 0 0;width:min(390px,100%);z-index:60;background:#08182C;
  border-right:1px solid rgba(181,148,85,.35);transform:translateX(-100%);
  transition:transform .4s var(--courbe);display:flex;flex-direction:column}
#drawer.open{transform:none}
#drawer header{padding:22px 24px 16px;border-bottom:1px solid rgba(181,148,85,.25)}
#drawer h3{margin:0;font-family:"Cormorant Garamond",serif;font-size:24px;letter-spacing:.18em;
  color:var(--or-clair);text-transform:uppercase}
#q{width:100%;margin-top:14px;padding:11px 13px;background:rgba(255,255,255,.06);color:var(--papier);
  border:1px solid rgba(181,148,85,.35);border-radius:2px;font-family:"Source Serif 4",serif;font-size:14px;
  transition:border-color .25s ease,box-shadow .25s ease}
#q::placeholder{color:#6E7F93}
#q:focus{outline:none;border-color:var(--or);box-shadow:0 0 0 3px rgba(181,148,85,.18)}
#toc{flex:1;overflow:auto;padding:12px 14px 30px;scrollbar-width:thin;scrollbar-color:rgba(181,148,85,.5) transparent}
#toc::-webkit-scrollbar{width:7px}
#toc::-webkit-scrollbar-thumb{background:rgba(181,148,85,.5);border-radius:4px}
#toc .l{margin:16px 0 6px;font-family:"Source Serif 4",serif;font-weight:700;font-size:11px;
  letter-spacing:.22em;color:var(--or);text-transform:uppercase}
#toc .t{margin:10px 0 4px;padding-left:10px;font-family:"Cormorant Garamond",serif;font-size:18px;
  letter-spacing:.04em;color:#AFC0D2}
#toc a{display:flex;gap:10px;align-items:baseline;padding:8px 10px 8px 20px;color:#9FB0C2;
  text-decoration:none;font-size:14px;border-left:1px solid rgba(181,148,85,.2);
  transition:background .18s ease,color .18s ease,padding-left .18s ease,border-color .18s ease}
#toc a:hover{background:rgba(181,148,85,.14);color:var(--papier);border-left-color:var(--or);padding-left:26px}
#toc a b{font-family:"Source Serif 4",serif;font-weight:700;color:var(--or);min-width:34px}
#toc a i{margin-left:auto;font-style:normal;font-size:11px;letter-spacing:.08em;color:#5E7086}
#toc .vide{padding:24px 10px;color:#5E7086;font-size:14px;line-height:1.6}
#drawer.open #toc>*{animation:glisse .4s var(--courbe) both}
#drawer.open #toc>:nth-child(-n+14){animation-delay:calc(.02s * var(--i,0))}
@keyframes glisse{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:none}}
#scrim{position:fixed;inset:0;background:rgba(3,8,15,.65);z-index:50;opacity:0;pointer-events:none;transition:.3s}
#scrim.on{opacity:1;pointer-events:auto}

/* ===== Couverture fermée ===== */
#couv{position:fixed;inset:0;z-index:70;display:grid;place-items:center;perspective:2200px;
  background:radial-gradient(ellipse at 50% 45%,#132741 0%,#050B14 72%);
  transition:opacity .5s ease .3s}
#couv.parti{opacity:0;pointer-events:none}
#couv .pile{display:flex;flex-direction:column;align-items:center;gap:26px}
#couv img{max-height:74vh;max-width:86vw;cursor:pointer;transform-origin:left center;
  filter:drop-shadow(0 34px 60px rgba(0,0,0,.75));
  animation:poser 1s var(--courbe) both;
  transition:transform .8s var(--courbe),filter .8s ease,opacity .6s ease .2s}
@keyframes poser{from{opacity:0;transform:translateY(26px) scale(.97)}to{opacity:1;transform:none}}
#couv img:hover{transform:translateY(-10px) rotate(-.8deg) scale(1.015);
  filter:drop-shadow(0 46px 74px rgba(0,0,0,.82))}
#couv.parti img{transform:rotateY(-108deg) translateX(-8%);opacity:0;animation:none}
#couv .pile .btn{animation:poser .9s var(--courbe) .25s both}

/* ===== États ===== */
#etat{position:fixed;inset:0;z-index:80;display:grid;place-items:center;padding:40px;
  background:radial-gradient(ellipse at 50% 40%,#132741 0%,#050B14 72%)}
#etat .carte{max-width:560px;text-align:center}
#etat h1{font-family:"Cormorant Garamond",serif;font-weight:700;font-size:28px;letter-spacing:.12em;
  color:var(--or-clair);text-transform:uppercase;margin:0 0 14px}
#etat p{color:#9FB0C2;font-size:15px;line-height:1.7;margin:0 0 12px}
#etat code{display:block;margin-top:14px;padding:12px 16px;background:rgba(255,255,255,.06);
  border:1px solid rgba(181,148,85,.35);color:var(--or-clair);font-family:ui-monospace,monospace;
  font-size:13px;text-align:left}
#etat.parti{display:none}
#etat .sablier{width:40px;height:40px;margin:0 auto 20px;border-radius:50%;
  border:2px solid rgba(181,148,85,.25);border-top-color:var(--or);animation:tourne 1s linear infinite}
@keyframes tourne{to{transform:rotate(360deg)}}

/* ===== Mode page unique (écrans étroits / portrait) ===== */
body.solo #stage{width:742px}
body.solo #book{background-size:200% 100%;background-position:right center}
body.solo .page.left{display:none}
body.solo .page.right{left:0;width:100%}
body.solo #leaf,body.solo #ombreGouttiere{display:none!important}

/* ===== Adaptations tactiles / petits écrans ===== */
@media (max-width:640px){
  #bar{height:48px;padding:0 10px;gap:6px}
  .btn{padding:6px 11px;font-size:11px;letter-spacing:.09em}
  .btn .kbd{display:none}
  #folio{font-size:10px;letter-spacing:.05em}
  .nav{width:44px;height:44px;font-size:19px}
  #prev{left:7px} #next{right:7px}
  #drawer header{padding:18px 18px 14px}
  #drawer h3{font-size:21px}
}
@media (max-width:380px){
  .nav{display:none}  /* place trop réduite : on navigue au swipe / flèches clavier */
}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;
    transition-duration:.01ms !important}
  #stage{transform:translate(-50%,-50%) scale(var(--s,1)) !important}
}
</style>

<div id="bar">
  <button class="btn" id="openToc" title="Ouvrir le sommaire et la recherche">Sommaire &amp; recherche<span class="kbd">/</span></button>
  <button class="btn" id="fermerLivre">Couverture</button>
  <div id="folio"></div>
</div>

<button class="nav" id="prev" aria-label="Page précédente">‹</button>
<button class="nav" id="next" aria-label="Page suivante">›</button>

<div id="scene"><div id="stage">
  <div id="book">
    <div class="page left"  id="pgL"></div>
    <div class="page right" id="pgR"></div>
    <div id="ombreGouttiere"></div>
    <div id="leaf"><div class="face front"></div><div class="face back"></div></div>
  </div>
</div></div>

<div id="scrim"></div>
<aside id="drawer">
  <header>
    <h3>Sommaire</h3>
    <input id="q" type="search" placeholder="Article, infraction, mot-clé…" autocomplete="off">
  </header>
  <nav id="toc"></nav>
</aside>

<div id="couv"><div class="pile">
  <img src="assets/couverture.webp" alt="Penal Code — The State of San Andreas" id="couvImg">
  <button class="btn" id="ouvrirLivre">Ouvrir le recueil</button>
</div></div>

<div id="etat"><div class="carte">
  <div class="sablier"></div>
  <h1 id="etat-t">Ouverture du recueil</h1>
  <div id="etat-c"><p>Chargement de <b>code-penal.json</b>…</p></div>
</div></div>

<script>
const FICHIER = "code-penal.json";
let META = {}, CODE = [];

const esc = s => String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const romain = n => ["","I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"][n]||n;
const norm = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase();
const doux = () => matchMedia("(prefers-reduced-motion:reduce)").matches;

/* ---------- Blocs ---------- */
const headHTML = () => `<div class="p-head"><div style="text-align:center">
  <h4>${esc(META.organisation)}</h4><h5>${esc(META.departement)}</h5></div></div>`;
const footHTML = p => `<div class="p-foot"><span>${esc(META.piedDePage)}</span>
  <span class="fleuron">&#10086;</span><span>Page ${p}</span></div>`;
const gardeHTML = () => `<div class="garde">
  <div class="flourish">&#10087; &#10086; &#10087;</div>
  <h1>${esc(META.organisation)}</h1>
  <div class="sub">${esc(META.departement)}</div><div class="sep"></div>
  <h2>${esc(META.titre)}</h2><div class="sep"></div>
  <div class="edition">${esc(META.edition)}</div>
  <div class="devise">${esc(META.devise||"")}</div></div>`;
const blocLivre = l => `<div class="b-livre"><span class="tag">${esc(l.livre)}</span>
  <h2>${esc(l.nom)}</h2><div class="rule">&#10070;</div></div>`;
const blocTitre = (t,i) => `<div class="b-titre"><div class="k">Section ${romain(i+1)}</div>
  <div class="n">${esc(t.nom)}</div></div>`;
const blocArticle = a => `<div class="b-art" id="art-${esc(a.n)}">
  <div class="num"><small>Article</small><b>${esc(a.n)}</b></div>
  <div><h3>${esc(a.t)}</h3>${(a.p||[]).map(x=>`<p>${esc(x)}</p>`).join("")}
  ${a.peine?`<div class="peine">${esc(a.peine)}</div>`:""}</div></div>`;

/* ---------- Pagination mesurée ---------- */
const pages=[], indexArticles=[];

function paginer(){
  pages.length=0; indexArticles.length=0;
  pages.push({garde:true});
  pages.push({sommaire:true});

  const m=document.createElement("div");
  m.className="page right"; m.style.cssText="position:absolute;visibility:hidden;left:-9999px;top:0";
  m.innerHTML=headHTML()+'<div class="page-inner" id="mi"></div>'+footHTML(0);
  document.getElementById("book").appendChild(m);
  const box=m.querySelector("#mi");

  let courant=[];
  const pousser=()=>{ if(courant.length){ pages.push({blocs:courant.slice()}); courant=[]; box.innerHTML=""; } };
  const tente=html=>{
    box.insertAdjacentHTML("beforeend",html);
    if(box.scrollHeight>box.clientHeight && courant.length){
      box.lastElementChild.remove(); pousser();
      box.insertAdjacentHTML("beforeend",html);
    }
    courant.push(html);
    return pages.length;
  };

  CODE.forEach(l=>{
    pousser();
    tente(blocLivre(l));
    (l.titres||[]).forEach((t,i)=>{
      tente(blocTitre(t,i));
      (t.articles||[]).forEach(a=>{
        const p=tente(blocArticle(a));
        indexArticles.push({n:a.n, t:a.t, livre:l.livre, titre:t.nom,
          texte:(a.t+" "+(a.p||[]).join(" ")+" "+(a.peine||"")).toLowerCase(), page:p});
      });
    });
  });
  pousser(); m.remove();

  pages[1]={blocs:[sommaireHTML()], scroll:true};
  if(pages.length%2) pages.push({blocs:[]});
}

function sommaireHTML(){
  let h=`<div class="b-somm"><h2>Sommaire</h2><div class="rule">&#10070;</div>`;
  CODE.forEach(l=>{
    h+=`<div class="sl">${esc(l.livre)} &mdash; ${esc(l.nom)}</div>`;
    (l.titres||[]).forEach((t,i)=>{
      h+=`<div class="st">Section ${romain(i+1)} &middot; ${esc(t.nom)}</div>`;
      (t.articles||[]).forEach(a=>{
        const e=indexArticles.find(x=>x.n===a.n);
        h+=`<div class="sa" data-p="${e.page}" data-n="${esc(a.n)}"><b>${esc(a.n)}</b>
          <span>${esc(a.t)}</span><span class="pt"></span><i>${e.page+1}</i></div>`;
      });
    });
  });
  return h+`</div>`;
}

/* ---------- Rendu & feuilletage ---------- */
const pgL=document.getElementById("pgL"), pgR=document.getElementById("pgR"),
      leaf=document.getElementById("leaf"), book=document.getElementById("book"),
      ombre=document.getElementById("ombreGouttiere");
let i=0, anim=false, dernierArt=null, SOLO=false;

/* bascule double-page ⇄ page unique selon la largeur */
function mode(){
  const solo=innerWidth<900;
  if(solo===SOLO) return;
  SOLO=solo;
  document.body.classList.toggle("solo",SOLO);
  if(!SOLO && i%2) i--;          // la double-page démarre sur un index pair
  peindre();
}

function corps(idx){
  const p=pages[idx];
  if(!p) return "";
  if(p.garde) return gardeHTML();
  return `${headHTML()}<div class="page-inner${p.scroll?" scroll":""}">${p.blocs.join("")}</div>${footHTML(idx+1)}`;
}
function peindre(){
  const debut=(i===0), fin=SOLO ? (i+1>=pages.length) : (i+2>=pages.length);
  if(SOLO){
    pgR.innerHTML=corps(i); pgL.innerHTML="";
    document.getElementById("folio").textContent=`Page ${i+1} sur ${pages.length}`;
  }else{
    pgL.innerHTML=corps(i); pgR.innerHTML=corps(i+1);
    document.getElementById("folio").textContent=`Page ${i+1}–${i+2} sur ${pages.length}`;
  }
  document.getElementById("prev").disabled=debut;
  document.getElementById("next").disabled=fin;
}
function tourner(sens){
  if(anim) return;
  const cible=i+sens*(SOLO?1:2);
  if(cible<0||cible>=pages.length) return;
  if(SOLO){ i=cible; doux()?peindre():fondu(); return; }
  if(doux()){ i=cible; peindre(); return; }
  anim=true;
  const f=leaf.querySelector(".front"), b=leaf.querySelector(".back");
  if(sens>0){ pgR.innerHTML=corps(i+3); f.innerHTML=corps(i+1); b.innerHTML=corps(i+2); }
  else      { pgL.innerHTML=corps(i-2); f.innerHTML=corps(i-1); b.innerHTML=corps(i);   }

  ombre.className = sens>0 ? "avant" : "arriere";
  leaf.style.display="flex"; leaf.classList.remove("anim");
  leaf.style.transform = sens>0 ? "rotateY(0deg)" : "rotateY(-180deg)";
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    leaf.classList.add("anim");
    ombre.classList.add("joue");
    leaf.style.transform = sens>0 ? "rotateY(-180deg)" : "rotateY(0deg)";
  }));
  leaf.addEventListener("transitionend",()=>{
    leaf.style.display="none"; leaf.classList.remove("anim");
    ombre.className="";
    i=cible; anim=false; peindre();
  },{once:true});
}
function fondu(){
  peindre();
  if(doux()) return;
  [pgL,pgR].forEach(p=>{ p.classList.remove("entree"); void p.offsetWidth; p.classList.add("entree"); });
  setTimeout(()=>[pgL,pgR].forEach(p=>p.classList.remove("entree")),900);
}
function allerA(page){
  const cible=SOLO ? Math.max(0,Math.min(page, pages.length-1))
                   : Math.max(0,Math.min(page%2?page-1:page, pages.length-2));
  ouvrirLivre();
  if(cible!==i){ i=cible; fondu(); }
  fermer(); setTimeout(surligner,120);
}
function surligner(){
  if(!dernierArt) return;
  const e=document.getElementById("art-"+dernierArt);
  if(e){ e.classList.remove("cible"); void e.offsetWidth; e.classList.add("cible"); }
}

/* ---------- Sommaire latéral + recherche ---------- */
const toc=document.getElementById("toc"), drawer=document.getElementById("drawer"),
      scrim=document.getElementById("scrim"), q=document.getElementById("q");

const ligne = a => `<a href="#art-${esc(a.n)}" data-p="${a.page}" data-n="${esc(a.n)}">
  <b>${esc(a.n)}</b><span>${esc(a.t)}</span><i>p.${a.page+1}</i></a>`;

function rendreToc(filtre=""){
  const f=norm(filtre.trim());
  if(!f){
    toc.innerHTML=CODE.map(l=>`<div class="l">${esc(l.livre)} &mdash; ${esc(l.nom)}</div>`+
      (l.titres||[]).map((t,k)=>`<div class="t">Section ${romain(k+1)} &middot; ${esc(t.nom)}</div>`+
        (t.articles||[]).map(a=>ligne(indexArticles.find(x=>x.n===a.n))).join("")).join("")).join("");
  }else{
    const res=indexArticles.filter(a=>norm(a.texte).includes(f)||String(a.n).includes(f));
    toc.innerHTML = res.length ? res.map(ligne).join("")
      : `<div class="vide">Aucun article ne correspond à «&nbsp;${esc(filtre)}&nbsp;». Essaie un numéro d'article ou un mot du texte.</div>`;
  }
  [...toc.children].forEach((el,k)=>el.style.setProperty("--i",Math.min(k,14)));
}
toc.addEventListener("click",e=>{ const a=e.target.closest("a"); if(!a) return;
  e.preventDefault(); dernierArt=a.dataset.n;
  history.replaceState(null,"","#art-"+a.dataset.n); allerA(+a.dataset.p); });
book.addEventListener("click",e=>{ const s=e.target.closest(".sa"); if(!s) return;
  dernierArt=s.dataset.n; allerA(+s.dataset.p); });
q.addEventListener("input",()=>rendreToc(q.value));

const ouvrir=f=>{ drawer.classList.add("open"); scrim.classList.add("on"); if(f){q.focus();q.select();} };
const fermer=()=>{ drawer.classList.remove("open"); scrim.classList.remove("on"); };
document.getElementById("openToc").onclick=()=>{ ouvrirLivre(); ouvrir(false); };
scrim.onclick=fermer;

/* ---------- Couverture ---------- */
const couv=document.getElementById("couv");
const ferme=()=>!couv.classList.contains("parti");
function ouvrirLivre(){
  if(!ferme()) return;
  couv.classList.add("parti");
  setTimeout(()=>book.classList.add("ouvert"), doux()?0:260);
}
function fermerLivre(){ couv.classList.remove("parti"); book.classList.remove("ouvert"); }
document.getElementById("ouvrirLivre").onclick=ouvrirLivre;
document.getElementById("couvImg").onclick=ouvrirLivre;
document.getElementById("fermerLivre").onclick=fermerLivre;

/* ---------- Navigation ---------- */
document.getElementById("prev").onclick=()=>tourner(-1);
document.getElementById("next").onclick=()=>tourner(1);
addEventListener("keydown",e=>{
  if(e.key==="Escape"){ fermer(); return; }
  if((e.ctrlKey||e.metaKey)&&e.key==="f"){ e.preventDefault(); ouvrirLivre(); ouvrir(true); return; }
  if(document.activeElement===q) return;
  if(ferme()){
    if(e.key==="Enter"||e.key===" "||e.key==="ArrowRight"){ e.preventDefault(); ouvrirLivre(); }
    return;
  }
  if(e.key==="/"){ e.preventDefault(); ouvrir(true); }
  if(e.key==="ArrowRight"||e.key===" "){ e.preventDefault(); tourner(1); }
  if(e.key==="ArrowLeft") tourner(-1);
  if(e.key==="Home") allerA(0);
  if(e.key==="End") allerA(pages.length-1);
});
let x0=null;
book.addEventListener("pointerdown",e=>{ x0 = e.target.closest(".scroll") ? null : e.clientX; });
book.addEventListener("pointerup",e=>{ if(x0===null) return;
  const d=e.clientX-x0; x0=null; if(Math.abs(d)>60) tourner(d<0?1:-1); });

/* ---------- Échelle + parallaxe ---------- */
const stage=document.getElementById("stage");
function ajuster(){
  const W=(SOLO?742:1484)+56, H=1120;
  const s=Math.min(innerWidth/W,(innerHeight-56)/H,1);
  stage.style.setProperty("--s",s);
}
addEventListener("resize",()=>{ mode(); ajuster(); });

/* ---------- Chargement ---------- */
function panne(titre,corpsHTML){
  document.querySelector("#etat .sablier").style.display="none";
  document.getElementById("etat-t").textContent=titre;
  document.getElementById("etat-c").innerHTML=corpsHTML;
}
async function demarrer(){
  let data;
  try{
    const r=await fetch(FICHIER,{cache:"no-store"});
    if(!r.ok) throw new Error("HTTP "+r.status);
    data=await r.json();
  }catch(err){
    if(location.protocol==="file:"){
      panne("Le navigateur bloque la lecture du fichier",
        `<p>Ouvert en <b>file://</b>, Chrome refuse de charger <b>${FICHIER}</b>. Lance un serveur local depuis ce dossier :</p>
         <code>python -m http.server 8000</code>
         <p style="margin-top:12px">Puis ouvre <b>http://localhost:8000</b>.</p>`);
    }else{
      panne("Le recueil n'a pas pu être chargé",
        `<p>${FICHIER} est introuvable ou mal formé.</p>
         <p style="color:#6E7F93">Détail : ${esc(err.message)}</p>
         <p>Vérifie le JSON sur <b>jsonlint.com</b> — une virgule en trop suffit à tout bloquer.</p>`);
    }
    return;
  }

  META=data.meta||{}; CODE=data.livres||[];
  if(!CODE.length){ panne("Le recueil est vide",`<p>Ajoute au moins un livre dans <b>${FICHIER}</b>.</p>`); return; }

  paginer();
  mode(); rendreToc(); peindre(); ajuster();
  document.getElementById("etat").classList.add("parti");

  const m=location.hash.match(/^#art-(\w+)$/);
  if(m){ const e=indexArticles.find(a=>String(a.n)===m[1]);
    if(e){ dernierArt=e.n; allerA(e.page); } }
}
document.fonts ? document.fonts.ready.then(demarrer) : demarrer();
</script>
</html>
